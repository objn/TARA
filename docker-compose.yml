services:
  redis:
    image: redis:8.2.5-bookworm
    container_name: tara-redis
    profiles: ["db"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:18.3-bookworm
    container_name: tara-postgres
    profiles: ["db"]
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tara
      POSTGRES_USER: tara
      POSTGRES_PASSWORD: tara
    volumes:
      - postgres-data:/var/lib/postgresql

  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: tara-gitlab
    restart: unless-stopped
    hostname: gitlab.local
    shm_size: "256m"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.local'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
    ports:
      - "8080:80"
      - "8443:443"
      - "2222:22"
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab

  mcp:
    image: python:3.12-slim
    container_name: tara-mcp
    profiles: ["tara"]
    working_dir: /core
    restart: unless-stopped
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "9000"
      PIP_CACHE_DIR: /pip-cache
    volumes:
      - ./:/core
      - tara-cache:/pip-cache
    ports:
      - "9000:9000"
    command: >
      bash -lc "pip install -q -r requirements.txt && uvicorn mcp.main:app --host 0.0.0.0 --port 9000"

  tara:
    image: python:3.12-slim
    container_name: tara
    profiles: ["tara"]
    working_dir: /core
    restart: unless-stopped
    depends_on:
      - mcp
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://tara:tara@postgres:5432/tara
      MCP_BASE_URL: http://mcp:9000
      HOST: "0.0.0.0"
      PORT: "8000"
      PIP_CACHE_DIR: /pip-cache
    volumes:
      - ./:/core
      - tara-cache:/pip-cache
    ports:
      - "8000:8000"
    command: >
      bash -lc "pip install -q -r requirements.txt && uvicorn core.main:app --host 0.0.0.0 --port 8000"

volumes:
  redis-data:
  postgres-data:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  tara-cache:
